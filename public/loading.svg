<svg width="128" height="128" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="bubbleBorder"
      d="M6 19.5V17H4.75C4.05 17 3.46 16.76 2.97 16.28C2.49 15.79 2.25 15.2 2.25 14.5V6.5C2.25 5.8 2.49 5.21 2.97 4.72C3.46 4.24 4.05 4 4.75 4H19.25C19.95 4 20.54 4.24 21.03 4.72C21.51 5.21 21.75 5.8 21.75 6.5V14.5C21.75 15.2 21.51 15.79 21.03 16.28C20.54 16.76 19.95 17 19.25 17H10.5L6 19.5Z"/>
  </defs>

  <!-- Base border -->
  <use href="#bubbleBorder"
    stroke="currentColor"
    stroke-opacity="0.22"
    stroke-width="1.8"
    stroke-linejoin="round"
    stroke-linecap="round"
    fill="none"/>

  <!-- Animated progress segment -->
  <use href="#bubbleBorder"
    stroke="currentColor"
    stroke-width="1.8"
    stroke-linejoin="round"
    stroke-linecap="round"
    fill="none"
    pathLength="100"
    stroke-dasharray="18 82">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="3s" repeatCount="indefinite"/>
  </use>

  <!-- Inner text lines -->
  <path d="M6.5 8H11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M6.5 12H9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Arrow following border -->
  <path d="M-1.8 -0.9 L0 0 L-1.8 0.9"
    stroke="currentColor"
    stroke-width="1.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#bubbleBorder"/>
    </animateMotion>
  </path>
</svg>